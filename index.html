<!DOCTYPE html>
<html lang="ja">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap" rel="stylesheet">
    <title>逆アキネーター</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <picture>
      <source srcset="images/title.avif" type="image/avif">
      <source srcset="images/title.webp" type="image/webp">
      <img src="images/title.png" alt="逆アキネーター" id="title">
    </picture>
    <picture>
      <source srcset="images/responser.avif" type="image/avif">
      <source srcset="images/responser.webp" type="image/webp">
      <img src="images/responser.png" alt="メインキャラクター" id="owl">
    </picture>
    <button id="start-button" onclick="gameStart()">Game Start</button>
    <div id="loading3" style="display: none;">
      <div class="square-move-2"></div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
